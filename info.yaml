# Tiny Tapeout project information
project:
  title:        "snake game"      # Project title
  author:       "Valeria Molano, Luisa Fernanda Avendaño, Juan David Guerrero"      # Your name
  discord:      "divadnauj-GB"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "snake videogame on led matrices"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_snake"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "debounce.v"
    - "game_core_seq3.v"
    - "seven_seg.v"
    - "snake_top3.v"
    - "spi_driver2.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "left"
  ui[1]: "right"
  ui[2]: "down"
  ui[3]: "up"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "spi_din"
  uo[1]: "spi_clk"
  uo[2]: "spi_cs"
  uo[3]: ""
  uo[4]: "disp0[0]"
  uo[5]: "disp0[1]"
  uo[6]: "disp0[2]"
  uo[7]: "disp0[3]"

  # Bidirectional pins
  uio[0]: "disp1[0]"
  uio[1]: "disp1[1]"
  uio[2]: "disp1[2]"
  uio[3]: "disp1[3]"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
